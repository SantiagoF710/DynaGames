<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explorá el catálogo completo de videojuegos de Dyna Games.">
    <title>Dyna Games - Catálogo</title>
    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="css/Style.css">

</head>

<body class="page-catalog">

    <header>

        <div class="flexbox centrado">
            
            <div class="logo">

                <div>
                    
                    <a href="index.html" aria-label="Ir al inicio" class="brand-link">
                        <img src="img/logo.png" alt="Dyna Games">
                        <span class="brand-copy"><strong>Dyna</strong><small>Games Store</small></span>
                    </a>
                
                </div>

            </div>
          
                <nav aria-label="Navegación principal">
            
                    <a href="index.html">Inicio</a>
                    <a href="index-Catalogo.html" id="catalogo" aria-current="page">Catálogo</a>
                    <a href="index.html#contacto">Contacto</a>
    
                </nav>

        </div>

        <div class="compra">

            <div>
    
                <a href="#" aria-label="Ver carrito"><img src="img/compra2.png" alt=""></a>
    
            </div>
    
            <div>
    
                <a href="#" aria-label="Ver carrito"><img src="img/compra.png" alt=""></a>
    
            </div>
    
        </div>

    </header>

    <main>

    <section class="catalog-hero">
        <div class="centrado catalog-heading">
            <p class="eyebrow">Encontrá tu próximo juego</p>
            <h1>Catálogo</h1>
            <p>Explorá nuestra colección por nombre, género o modo de juego.</p>
        </div>

        <div class="filter-shell centrado">

        <div class="titulo">   
            
            <article>
                <label for="texto">Buscar</label>
                <input type="search" id="texto" placeholder="Nombre del juego">
            </article>

            <article>

                <label for="generos">Géneros</label>
                <select name="generos" id="generos">
                    <option value="todos">Todos</option>
                
                </select>

            </article>

            <article>

                <label for="modosjuego">Modos de juego</label>
                <label>
                    <input type="radio" name="modosjuego" value="Todos" checked>
                    Todos
                </label>
                <label>
                    <input type="radio" name="modosjuego" value="Multijugador">
                    Multijugador
                </label>
                
                <label>
                    <input type="radio" name="modosjuego" value="Un jugador">
                    Un jugador
                </label>

            </article>

        </div>
        </div>

    </section>

    <section id="primeraseccion" class="centrado flex shadow">

        <h2>Resultados</h2>

        <article id="grilla">

        </article>

        <div id="btn_numeros">

        </div>

    </section>

    </main>

    <footer>

        <div class="centrado">

            <div class="footer-social">
                
                <a href="#" aria-label="Instagram"> <img src="img/instagram.png" alt=""></a>
                <a href="#" aria-label="Twitter"> <img src="img/twitter.png" alt=""></a>
                <a href="#" aria-label="Facebook"> <img src="img/facebook.png" alt=""></a>
    
            </div>
    
            <div class="footer-copy">

                <strong>Dyna Games</strong>
                <p>Tu mundo, tus juegos, tu próxima aventura.</p>
    
            </div>

        </div>

    </footer>

    

    
    

    <script src="js/script-bd.js"></script>
    <script src="js/script-catalogo.js"></script>
</body>

</html>
